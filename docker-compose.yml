version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanager_backend
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/taskmanager
      REDIS_URL: redis://redis:6379
      JWT_SECRET: myverystrongsecretkey
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: taskmanager_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: taskmanager_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
